services:
  backend:
    build:
      context: .
      dockerfile: backend/devDockerfile
    working_dir: /app
    restart: unless-stopped
    env_file: ./backend/.env
    ports:
      - "${APP_PORT:-3010}:${APP_PORT:-3010}"
    volumes:
      # Mount backend source for hot-reload and migration access
      - ./backend:/app
      # Isolate container node_modules from host
      - /app/node_modules
    develop:
      watch:
        - action: rebuild
          path: ./backend/package.json
        - action: rebuild
          path: ./backend/package-lock.json
        - action: sync+restart
          path: ./backend/prisma/schema.prisma
          target: /app/prisma/schema.prisma
        - action: sync+restart
          path: ./backend/prisma.config.ts
          target: /app/prisma.config.ts
        - action: sync+restart
          path: ./backend/tsconfig.json
          target: /app/tsconfig.json
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: frontend
      dockerfile: devDockerfile
    working_dir: /app
    restart: unless-stopped
    env_file: ./frontend/.env
    # environment:
    #   CHOKIDAR_USEPOLLING: "true"
    #   CHOKIDAR_INTERVAL: "300"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  db:
    container_name: ${APP_NAME:-word-cards}_database
    image: postgres:17-alpine
    env_file: ./backend/.env
    ports:
      - "${DB_PORT:-5435}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-root} -d ${POSTGRES_DB:-word_cards}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres_data:
